<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <!--[if !mso]><!-->
  <style>
    @media only screen and (max-width: 620px) {
      .email-wrapper { padding: 16px 8px !important; }
      .email-card   { width: 100% !important; }
      .email-body   { padding: 28px 20px !important; }
      .code-box     { font-size: 32px !important; letter-spacing: 6px !important; }
    }
  </style>
  <!--<![endif]-->
</head>
<body style="margin:0;padding:0;background-color:#f3f4f6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;">

  <!--[if mso]><table role="presentation" width="100%" border="0" cellspacing="0" cellpadding="0" bgcolor="#f3f4f6"><tr><td align="center"><![endif]-->
  <table role="presentation" width="100%" border="0" cellspacing="0" cellpadding="0"
         style="background-color:#f3f4f6;" class="email-wrapper">
    <tr>
      <td align="center" style="padding:48px 16px;" class="email-wrapper">

        <table role="presentation" border="0" cellspacing="0" cellpadding="0"
               width="600" style="max-width:600px;width:100%;" class="email-card">

          <!-- ── Header ───────────────────────────────────────────── -->
          <tr>
            <td style="background-color:#40BA21;padding:28px 36px;border-radius:10px 10px 0 0;">
              <table role="presentation" width="100%" border="0" cellspacing="0" cellpadding="0">
                <tr>
                  <td>
                    <p style="margin:0;font-size:22px;font-weight:700;color:#ffffff;letter-spacing:-0.3px;">
                      IU Alumni
                    </p>
                    <p style="margin:4px 0 0;font-size:12px;color:rgba(255,255,255,0.78);letter-spacing:0.2px;">
                      Innopolis University Alumni Platform
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- ── Body ─────────────────────────────────────────────── -->
          <tr>
            <td style="background-color:#ffffff;padding:40px 36px;border:1px solid #e5e7eb;
                        border-top:none;border-radius:0 0 10px 10px;" class="email-body">

              {% block content %}{% endblock %}

              <!-- Footer -->
              <table role="presentation" width="100%" border="0" cellspacing="0" cellpadding="0"
                     style="margin-top:40px;">
                <tr>
                  <td style="border-top:1px solid #e5e7eb;padding-top:20px;">
                    <p style="margin:0;font-size:12px;color:#9ca3af;line-height:1.7;">
                      This is an automated message from IU Alumni Platform.
                      Please do not reply to this email.
                    </p>
                    <p style="margin:6px 0 0;font-size:12px;color:#b0b7c3;">
                      &copy; Innopolis University Alumni Platform
                    </p>
                  </td>
                </tr>
              </table>

            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
  <!--[if mso]></td></tr></table><![endif]-->

</body>
</html>
